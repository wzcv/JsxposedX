name: Build & Release APK

on:
  push: 
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_flavor:
        description: '构建 flavor'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api100
          - api101

# 同一时间只允许一个 release 工作流运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK (${{ matrix.flavor }} - ${{ matrix.abi_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - api100
          - api101
        abi:
          - android-arm64
          - android-arm
          - android-x64
          - android-arm64,android-arm,android-x64
        include:
          # 为每个 abi 值映射可读名称
          - abi: android-arm64
            abi_name: arm64-v8a
          - abi: android-arm
            abi_name: armeabi-v7a
          - abi: android-x64
            abi_name: x86_64
          - abi: android-arm64,android-arm,android-x64
            abi_name: universal
        exclude:
          # workflow_dispatch 手动触发时，根据选择排除不需要的 flavor
          - flavor: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_flavor == 'api101' && 'api100' || 'NONE' }}
          - flavor: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_flavor == 'api100' && 'api101' || 'NONE' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Setup signing key
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build APK (${{ matrix.flavor }} - ${{ matrix.abi_name }})
        run: |
          flutter build apk \
            --flavor ${{ matrix.flavor }} \
            --release \
            --target-platform ${{ matrix.abi }}

      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          APK_SRC="build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk"
          APK_DST="JsxposedX-v${VERSION_NAME}-${{ matrix.flavor }}-${{ matrix.abi_name }}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: apk-${{ matrix.flavor }}-${{ matrix.abi_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Download all APK artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: apk-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.tag }}" ]; then
            echo "body=Initial release 🎉" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD --no-merges)
            # 使用 heredoc 写入多行内容
            {
              echo "body<<CHANGELOG_EOF"
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG"
              echo ""
              echo "---"
              echo "### 📦 APK 说明"
              echo "| 文件 | 说明 |"
              echo "|------|------|"
              echo "| \`*-arm64-v8a.apk\` | 64位 ARM 设备（推荐，现代手机） |"
              echo "| \`*-armeabi-v7a.apk\` | 32位 ARM 设备（旧设备） |"
              echo "| \`*-x86_64.apk\` | x86_64 设备（模拟器） |"
              echo "| \`*-universal.apk\` | 全架构通用包（体积较大） |"
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}"
              echo "CHANGELOG_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "JsxposedX ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
